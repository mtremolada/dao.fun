name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes older in-flight runs, so a rapid
# series of pushes doesn't leave stale (pre-fix) runs reporting red on main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build
      - run: pnpm test:unit

  # Integration suite (spec Section 3): the REAL mainnet program binaries
  # (SPL Governance, Squads v4, VSR, Token-2022 — committed under
  # tests/fixtures, dumped by scripts/dump-mainnet-programs.ts) run in
  # solana-bankrun. Hermetic: no validator install, no network, and clock
  # warp enables the hold-up / lockup-decay assertions a live cluster can't.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build workspace packages first: the integration tests (and the backend
      # they import) resolve the `@daofun/sdk` barrel from dist/, so without this
      # collection fails with "Failed to resolve entry for package @daofun/sdk".
      - run: pnpm -r run build
      - run: pnpm test:integration
