name: GitHub Pages (browser test deploy)

# A live, in-browser test deploy on GitHub Pages, built with the repo-name
# basePath so /_next/ assets and internal links resolve under /<repo>/. This
# is independent of the IPFS path (deploy.yml), which builds with NO basePath
# for subdomain gateways — best of both worlds from one source tree.
on:
  push:
    branches: [claude/pensive-feynman-pvw5vy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Project site lives at https://<owner>.github.io/<repo>/
      NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL || 'https://api.mainnet-beta.solana.com' }}
      NEXT_PUBLIC_PROTOCOL_TREASURY: ${{ vars.NEXT_PUBLIC_PROTOCOL_TREASURY }}
      NEXT_PUBLIC_LAUNCH_FEE: ${{ vars.NEXT_PUBLIC_LAUNCH_FEE || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @daofun/sdk build
      - run: pnpm --filter @daofun/app build
      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/out
      - id: deployment
        uses: actions/deploy-pages@v4
